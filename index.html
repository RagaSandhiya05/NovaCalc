<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SoftNeuro Calculator</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Background -->
    <div class="background">
        <span class="blob blob1"></span>
        <span class="blob blob2"></span>
        <span class="blob blob3"></span>
        <span class="blob blob4"></span>
    </div>

    <!-- Calculator -->
    <div class="calculator">
        <button id="themeToggle">🌙</button>

        <!-- Display -->
        <div class="display">

            <div id="history"></div>

            <input
                type="text"
                id="result"
                value="0"
                readonly
            >

        </div>

        <!-- Buttons -->
        <div class="buttons">

            <button class="btn function" data-value="AC">AC</button>
            <button class="btn function" data-value="+/-">+/-</button>
            <button class="btn function" data-value="%">%</button>
            <button class="btn operator" data-value="/">/</button>

            <button class="btn number" data-value="7">7</button>
            <button class="btn number" data-value="8">8</button>
            <button class="btn number" data-value="9">9</button>
            <button class="btn operator" data-value="*">×</button>

            <button class="btn number" data-value="4">4</button>
            <button class="btn number" data-value="5">5</button>
            <button class="btn number" data-value="6">6</button>
            <button class="btn operator" data-value="-">−</button>

            <button class="btn number" data-value="1">1</button>
            <button class="btn number" data-value="2">2</button>
            <button class="btn number" data-value="3">3</button>
            <button class="btn operator" data-value="+">+</button>

            <button class="btn zero number" data-value="0">0</button>
            <button class="btn number" data-value=".">.</button>
            <button class="btn equal" data-value="=">=</button>

        </div>

    </div>

    <!-- JavaScript -->
    <script src="js/script.js"></script>

</body>
</html>
